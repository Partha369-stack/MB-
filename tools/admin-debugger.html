<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Session Debugger</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #00ff00;
        }

        .log {
            background: #000;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #00ff00;
            border-radius: 4px;
            max-height: 500px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
        }

        .error {
            border-left-color: #ff0000;
            color: #ff0000;
        }

        .warning {
            border-left-color: #ffaa00;
            color: #ffaa00;
        }

        .success {
            border-left-color: #00ff00;
            color: #00ff00;
        }

        .info {
            border-left-color: #00aaff;
            color: #00aaff;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }

        button:hover {
            background: #00cc00;
        }

        .status {
            padding: 20px;
            margin: 20px 0;
            border: 2px solid #00ff00;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>🔍 Admin Session Debugger</h1>

    <div class="status">
        <h2>Current Status</h2>
        <div id="status"></div>
    </div>

    <div>
        <button onclick="checkSession()">Check Session</button>
        <button onclick="clearLogs()">Clear Logs</button>
        <button onclick="window.location.href='http://localhost:5173/admin'">Open Admin Panel</button>
    </div>

    <div class="log" id="logs"></div>

    <script>
        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.insertBefore(entry, logsDiv.firstChild);
        }

        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }

        function checkSession() {
            log('=== SESSION CHECK START ===', 'info');

            // Check localStorage
            const hardcodedFlag = localStorage.getItem('hardcoded_admin_session');
            const userSession = localStorage.getItem('mb_user_session');

            log(`hardcoded_admin_session: ${hardcodedFlag}`, hardcodedFlag === 'true' ? 'success' : 'warning');
            log(`mb_user_session exists: ${!!userSession}`, userSession ? 'success' : 'error');

            if (userSession) {
                try {
                    const user = JSON.parse(userSession);
                    log(`User ID: ${user.id}`, user.id === 'super-admin-hardcoded' ? 'success' : 'warning');
                    log(`User Email: ${user.email}`, 'info');
                    log(`User Role: ${user.role}`, user.role === 'admin' ? 'success' : 'warning');
                } catch (e) {
                    log(`Error parsing user session: ${e.message}`, 'error');
                }
            }

            log('=== SESSION CHECK END ===', 'info');
            updateStatus();
        }

        function updateStatus() {
            const statusDiv = document.getElementById('status');
            const hardcodedFlag = localStorage.getItem('hardcoded_admin_session');
            const userSession = localStorage.getItem('mb_user_session');

            let html = '';

            if (hardcodedFlag === 'true' && userSession) {
                try {
                    const user = JSON.parse(userSession);
                    if (user.id === 'super-admin-hardcoded') {
                        html = `
                            <div style="color: #00ff00;">
                                ✅ <strong>ADMIN SESSION ACTIVE</strong><br>
                                User: ${user.email}<br>
                                ID: ${user.id}<br>
                                Role: ${user.role}
                            </div>
                        `;
                    } else {
                        html = `<div style="color: #ffaa00;">⚠️ User session exists but not hardcoded admin</div>`;
                    }
                } catch (e) {
                    html = `<div style="color: #ff0000;">❌ Error: ${e.message}</div>`;
                }
            } else {
                html = `<div style="color: #ff0000;">❌ NO ADMIN SESSION</div>`;
            }

            statusDiv.innerHTML = html;
        }

        // Auto-check every 2 seconds
        setInterval(() => {
            updateStatus();
        }, 2000);

        // Initial check
        log('Debugger loaded', 'success');
        checkSession();
    </script>
</body>

</html>
