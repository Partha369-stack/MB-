<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Password Finder - Admin Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .user-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 800;
        }

        .user-info h3 {
            font-size: 18px;
            font-weight: 800;
            color: #333;
            margin-bottom: 5px;
        }

        .user-role {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-admin {
            background: #fef3c7;
            color: #92400e;
        }

        .role-sales {
            background: #dbeafe;
            color: #1e40af;
        }

        .role-delivery {
            background: #d1fae5;
            color: #065f46;
        }

        .role-customer {
            background: #e5e7eb;
            color: #374151;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 700;
            color: #333;
        }

        .password-value {
            background: #f0fdf4;
            color: #15803d;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        .no-users {
            background: white;
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .no-users h2 {
            color: #999;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stats {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            justify-content: space-around;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🔐 User Password Finder</h1>
            <p>Admin tool to view all user credentials from localStorage</p>
        </div>

        <div class="stats" id="stats"></div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search by name, phone, or role...">
        </div>

        <div class="users-grid" id="usersGrid"></div>
    </div>

    <script>
        // Get users from localStorage
        const users = JSON.parse(localStorage.getItem('mb_all_users') || '[]');

        // Calculate stats
        const stats = {
            total: users.length,
            admin: users.filter(u => u.role === 'admin').length,
            sales: users.filter(u => u.role === 'sales').length,
            delivery: users.filter(u => u.role === 'delivery').length,
            customer: users.filter(u => u.role === 'customer').length
        };

        // Render stats
        document.getElementById('stats').innerHTML = `
            <div class="stat-item">
                <div class="stat-value">${stats.total}</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">${stats.admin}</div>
                <div class="stat-label">Admins</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">${stats.sales}</div>
                <div class="stat-label">Sales</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">${stats.delivery}</div>
                <div class="stat-label">Delivery</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">${stats.customer}</div>
                <div class="stat-label">Customers</div>
            </div>
        `;

        function renderUsers(filteredUsers) {
            const grid = document.getElementById('usersGrid');

            if (filteredUsers.length === 0) {
                grid.innerHTML = `
                    <div class="no-users">
                        <h2>No users found</h2>
                        <p>Try a different search term</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredUsers.map(user => `
                <div class="user-card">
                    <div class="user-header">
                        <div class="user-avatar">${user.name?.charAt(0) || '?'}</div>
                        <div class="user-info">
                            <h3>${user.name || 'Unknown'}</h3>
                            <span class="user-role role-${user.role}">${user.role}</span>
                        </div>
                    </div>
                    <div class="user-details">
                        <div class="detail-row">
                            <span class="detail-label">Phone</span>
                            <span class="detail-value">${user.phone}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">User ID</span>
                            <span class="detail-value">${user.id}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Password</span>
                            <span class="password-value">${user.password || 'Not set'}</span>
                        </div>
                        <div class="detail-row">
                            <button class="copy-btn" onclick="copyPassword('${user.password}', '${user.name}')">
                                📋 Copy Password
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function copyPassword(password, name) {
            navigator.clipboard.writeText(password).then(() => {
                alert(`✅ Password for ${name} copied to clipboard!`);
            });
        }

        // Initial render
        renderUsers(users);

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = users.filter(u =>
                u.name?.toLowerCase().includes(searchTerm) ||
                u.phone?.toLowerCase().includes(searchTerm) ||
                u.role?.toLowerCase().includes(searchTerm) ||
                u.id?.toLowerCase().includes(searchTerm)
            );
            renderUsers(filtered);
        });

        // Highlight the specific user if found
        const targetUser = users.find(u => u.phone === '7894561235' || u.name === 'Sale-1');
        if (targetUser) {
            console.log('%c=== TARGET USER FOUND ===', 'color: green; font-size: 20px; font-weight: bold;');
            console.log('Name:', targetUser.name);
            console.log('Phone:', targetUser.phone);
            console.log('Password:', targetUser.password);
            console.log('Role:', targetUser.role);
            console.log('%c========================', 'color: green; font-size: 20px; font-weight: bold;');
        }
    </script>
</body>

</html>
