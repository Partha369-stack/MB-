<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mother Best - Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee2b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-white dark:bg-slate-950 overflow-x-hidden shadow-2xl">

<div class="flex w-full flex-col gap-6 items-center">
<div class="flex gap-4 flex-col items-center">
<div class="relative">

</div>
<div class="absolute bottom-1 right-1 bg-primary p-2 rounded-full border-2 border-white dark:border-slate-950">
<span class="material-symbols-outlined text-white text-xs">verified</span>
</div>
</div>
<div class="flex flex-col items-center justify-center">
<p class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight text-center">Devi</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal text-center">devi.customer@email.com</p>
</div>
</div>
</div>
</div>

<div class="px-4 py-2">
<h3 class="text-slate-900 dark:text-slate-100 text-sm font-bold uppercase tracking-widest px-2 pb-4">Account Information</h3>
<div class="space-y-2">
<!-- Phone -->
<div class="flex items-center gap-4 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800">
<div class="text-primary flex items-center justify-center rounded-lg bg-primary/10 shrink-0 size-10">
<span class="material-symbols-outlined">call</span>
</div>
<div class="flex flex-col flex-1">

</div>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div><!-- Email -->

<span class="material-symbols-outlined">location_on</span>
</div>
<div class="flex flex-col flex-1">

<span class="material-symbols-outlined text-slate-400 group-hover:translate-x-1 transition-transform text-base">chevron_right</span>
</button>
<button class="flex w-full items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 transition-colors group">

<span class="material-symbols-outlined">help_center</span>
</div>
<span class="text-slate-900 dark:text-slate-100 font-semibold flex-1 text-left">Help &amp; Support</span>
<span class="material-symbols-outlined text-slate-400 group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="flex w-full items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-red-50 dark:hover:bg-red-950/20 transition-colors group">
<div class="text-red-500 flex items-center justify-center size-6">
<span class="material-symbols-outlined">logout</span>

</button>
</div>
<div class="flex-grow"></div>

<div class="sticky bottom-0 border-t border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-lg px-4 pb-6 pt-3 flex gap-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-600 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-600 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">shopping_bag</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Products</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-600 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">receipt_long</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Orders</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">person</span>
