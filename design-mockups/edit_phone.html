<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee2b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102210",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="relative flex h-full max-h-[800px] w-full max-w-[480px] flex-col bg-white dark:bg-slate-900 overflow-hidden rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800">
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between border-b border-slate-100 dark:border-slate-800">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors" data-icon="arrow_back">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 ml-2">Edit Phone Number</h2>
</div>
<div class="flex flex-col flex-1 overflow-y-auto">
<!-- Illustration / Icon Section -->
<div class="flex justify-center py-8">
<div class="bg-primary/10 dark:bg-primary/5 p-6 rounded-full">
<span class="material-symbols-outlined text-primary text-5xl">phonelink_setup</span>
</div>
</div>
<!-- Content -->
<div class="px-6 py-4">
<h3 class="text-xl font-bold mb-2">Update your contact info</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                    Changing your phone number will update how you log in and where you receive notifications from Mother Best.
                </p>
</div>
<!-- Input Section -->
<div class="flex flex-col gap-4 px-6 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Phone Number</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">call</span>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:border-primary h-14 pl-12 pr-4 text-base font-normal leading-normal transition-all" type="tel" value="+1 234 567 8900"/>
</div>
</label>
</div>
<!-- Security Note -->
<div class="flex items-start gap-3 px-6 py-4 mt-2 bg-slate-50 dark:bg-slate-800/50 mx-6 rounded-xl border border-slate-100 dark:border-slate-800">
<span class="material-symbols-outlined text-primary text-xl shrink-0">info</span>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal leading-snug">
                    We'll send you a 6-digit verification code to this number to verify the change. Carrier rates may apply.
                </p>
</div>
</div>
<!-- Footer Actions -->
<div class="p-6 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-slate-900 text-base font-bold leading-normal tracking-[0.015em] hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
<span class="truncate">Verify &amp; Save Changes</span>
</button>
<button class="flex w-full mt-3 cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 bg-transparent text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="truncate">Cancel</span>
</button>
</div>
<div class="h-2 bg-white dark:bg-slate-900"></div>
</div>
</body></html>
